<!DOCTYPE html>
<html>
<head>
  <title>SQL Chatbot</title>
  <style>
    body {
      background-color: #1e1e1e;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* Chat container (small box) */
    #chat-container {
      width: 350px;
      height: 500px;
      background-color: #2e2e2e;
      border-radius: 15px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 0 15px rgba(0, 255, 204, 0.5);
    }

    /* Header */
    #header {
      background-color: #00ffcc;
      color: #1e1e1e;
      text-align: center;
      padding: 10px;
      font-weight: bold;
      font-size: 18px;
    }

    /* Chat messages */
    #chat {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background-color: #2e2e2e;
    }

    .message {
      padding: 8px 12px;
      border-radius: 12px;
      max-width: 80%;
      word-wrap: break-word;
      font-size: 14px;
    }

    .user {
      background-color: #00ffcc;
      color: #1e1e1e;
      align-self: flex-end;
    }

    .bot {
      background-color: #444;
      color: #e0e0e0;
      align-self: flex-start;
    }

    /* Input area */
    #input-area {
      display: flex;
      padding: 10px;
      border-top: 1px solid #555;
      background-color: #2a2a2a;
    }

    #question {
      flex: 1;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #555;
      background-color: #1e1e1e;
      color: #e0e0e0;
      font-size: 14px;
    }

    button {
      padding: 8px 12px;
      margin-left: 8px;
      border: none;
      border-radius: 8px;
      background-color: #00ffcc;
      color: #1e1e1e;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background-color: #00cc99;
    }
  </style>
</head>
<body>

  <div id="chat-container">
    <div id="header"> 🤖SQL AI Chatbot</div>
    <div id="chat"></div>
    <div id="input-area">
      <input id="question" placeholder="Ask a question...">
      <button onclick="ask()">Send</button>
    </div>
  </div>

  <script>
    const chat = document.getElementById('chat');

    async function ask() {
      const input = document.getElementById('question');
      const question = input.value.trim();
      if (!question) return;

      // Show user message
      const userMsg = document.createElement('div');
      userMsg.className = 'message user';
      userMsg.innerText = question;
      chat.appendChild(userMsg);
      input.value = '';
      chat.scrollTop = chat.scrollHeight;

      // Fetch bot response
      try {
        const res = await fetch("http://127.0.0.1:8000/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question })
        });
        const data = await res.json();

        const botMsg = document.createElement('div');
        botMsg.className = 'message bot';
        botMsg.innerText = data.answer || "No answer received.";
        chat.appendChild(botMsg);
        chat.scrollTop = chat.scrollHeight;
      } catch (err) {
        const botMsg = document.createElement('div');
        botMsg.className = 'message bot';
        botMsg.innerText = "Error connecting to server.";
        chat.appendChild(botMsg);
        chat.scrollTop = chat.scrollHeight;
      }
    }

    // Send on Enter
    document.getElementById('question').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') ask();
    });
  </script>

</body>
</html>
